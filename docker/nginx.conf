# Unprivileged nginx — listen 8080 (matches nginxinc/nginx-unprivileged)
# stub_status: scraped by nginx-prometheus-exporter sidecar (same pod).
# /metrics: proxied to exporter so browsers & Prometheus can use one hostname path.
#
# Keep in sync with: portfolio-k8s-security/docker/nginx.conf (Docker build context is this repo).

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Internal only — exporter reaches this from localhost in the same pod
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }

    # Prometheus text format (proxied to nginx-prometheus-exporter)
    location /metrics {
        proxy_pass http://127.0.0.1:9113/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
